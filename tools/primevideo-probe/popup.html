<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 480px;
      max-height: 600px;
      overflow-y: auto;
      font: 12px/1.5 'Consolas', 'Monaco', monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 12px;
    }
    h1 { font-size: 14px; color: #00d4ff; margin-bottom: 8px; }
    h2 { font-size: 12px; color: #ff9800; margin: 10px 0 4px; }
    .controls { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    button {
      padding: 4px 10px; border: 1px solid #444; border-radius: 4px;
      background: #2a2a4a; color: #e0e0e0; cursor: pointer; font-size: 11px;
    }
    button:hover { background: #3a3a5a; }
    button.on { background: #2e7d32; border-color: #4caf50; }
    button.off { background: #b71c1c; border-color: #f44336; }
    button.danger { border-color: #f44; }
    .status-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 8px; border-radius: 4px; margin-bottom: 8px;
    }
    .status-bar.idle { background: #222244; }
    .status-bar.ad { background: #4a2800; border: 1px solid #f90; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; }
    .badge-ad { background: #f57f17; color: #000; }
    .badge-idle { background: #333; }
    .badge-on { background: #2e7d32; }
    .badge-off { background: #b71c1c; }
    .video-row {
      display: flex; gap: 8px; align-items: center;
      padding: 4px 8px; background: #222244; border-radius: 4px; margin: 3px 0;
      font-size: 11px;
    }
    .video-row .label { color: #888; min-width: 60px; }
    .video-row .drm { color: #f90; }
    .video-row .no-drm { color: #4caf50; }
    .log-area {
      background: #111; border-radius: 4px; padding: 6px;
      font-size: 10px; max-height: 200px; overflow-y: auto;
    }
    .log-line { padding: 1px 0; }
    .log-line.ad { color: #f90; }
    .snapshot {
      background: #1e1e3a; border-left: 3px solid #444;
      padding: 4px 8px; margin: 3px 0; font-size: 11px;
    }
    .snapshot.has-ad { border-left-color: #f90; }
    #no-page { color: #f44; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <h1>Prime Video Ad Probe v2</h1>

  <div class="controls">
    <button id="btn-toggle">Auto-Skip: ---</button>
    <button id="btn-refresh">Refresh</button>
    <button id="btn-clear" class="danger">Clear</button>
  </div>

  <div id="status-bar" class="status-bar idle">
    <span id="status-text">Checking...</span>
  </div>

  <div id="videos"></div>

  <h2>Event Log</h2>
  <div id="log-area" class="log-area"></div>

  <h2>State Changes</h2>
  <div id="snapshots"></div>

  <div id="no-page" style="display:none">Prime Videoのページを開いてください</div>

  <script src="popup.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <radialGradient id="glow" cx="40" cy="40" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sym" x1="0" y1="36" x2="0" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <filter id="aura" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0C1E33" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="gl" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="126" height="126" rx="27" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Prime smile (behind symbol) -->
  <rect x="82" y="10" width="34" height="34" rx="5" fill="white" opacity="0.09"/>
  <!-- Letter "P" (wide) -->
  <g opacity="0.2" transform="translate(99,27) scale(1.4,1) translate(-99,-27)">
    <text x="99" y="40" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="32" fill="white" text-anchor="middle">P</text>
  </g>

  <!-- Symbol aura glow -->
  <g opacity="0.35" filter="url(#aura)">
    <polygon points="29,36 59,64 29,92" fill="#38BDF8"/>
    <polygon points="55,36 85,64 55,92" fill="#38BDF8"/>
    <rect x="91" y="36" width="9" height="56" rx="4.5" fill="#38BDF8"/>
  </g>

  <!-- Skip symbol with drop shadow -->
  <g filter="url(#ds)">
    <polygon points="29,36 59,64 29,92" fill="url(#sym)" stroke="url(#sym)" stroke-width="6" stroke-linejoin="round"/>
    <polygon points="55,36 85,64 55,92" fill="url(#sym)" stroke="url(#sym)" stroke-width="6" stroke-linejoin="round"/>
    <rect x="91" y="36" width="9" height="56" rx="4.5" fill="url(#sym)"/>
  </g>

  <!-- Glass overlay -->
  <rect width="128" height="128" rx="28" fill="url(#gl)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#581C87"/>
    </linearGradient>
    <radialGradient id="glow" cx="40" cy="40" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C084FC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#C084FC" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sym" x1="0" y1="36" x2="0" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
    <filter id="aura" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E0A3C" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="gl" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect width="128" height="128" rx="28" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="126" height="126" rx="27" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <!-- Glitch face (behind symbol, looking upper-right) -->
  <rect x="82" y="10" width="34" height="34" rx="5" fill="white" opacity="0.09"/>
  <!-- Face outline: left edge + bottom edge -->
  <polygon points="83,18 89,14 89,38 83,38" fill="white" opacity="0.2"/>
  <polygon points="83,38 112,38 108,44 83,44" fill="white" opacity="0.2"/>
  <!-- Eyes -->
  <rect x="99" y="18" width="2" height="9" rx="0.8" fill="white" opacity="0.2"/>
  <rect x="105" y="18" width="2" height="9" rx="0.8" fill="white" opacity="0.2"/>

  <!-- Symbol aura glow -->
  <g opacity="0.35" filter="url(#aura)">
    <polygon points="29,36 59,64 29,92" fill="#C084FC"/>
    <polygon points="55,36 85,64 55,92" fill="#C084FC"/>
    <rect x="91" y="36" width="9" height="56" rx="4.5" fill="#C084FC"/>
  </g>

  <!-- Skip symbol with drop shadow -->
  <g filter="url(#ds)">
    <polygon points="29,36 59,64 29,92" fill="url(#sym)" stroke="url(#sym)" stroke-width="6" stroke-linejoin="round"/>
    <polygon points="55,36 85,64 55,92" fill="url(#sym)" stroke="url(#sym)" stroke-width="6" stroke-linejoin="round"/>
    <rect x="91" y="36" width="9" height="56" rx="4.5" fill="url(#sym)"/>
  </g>

  <!-- Glass overlay -->
  <rect width="128" height="128" rx="28" fill="url(#gl)"/>
</svg>
